title: Daily Horizon
description: >-
  One deliberately off-path idea each morning — history, craft, biology,
  law, folklore, and the odd corners well outside the day job.
url: "https://jonstraveladventures.github.io"
baseurl: "/daily-horizon-broadener"
theme: minima
show_excerpts: true
permalink: /:year/:month/:day/:title/
# Build posts dated later today too — the generator stamps them 09:00, which is
# in the future at build time if published earlier in the morning.
future: true
plugins:
  - jekyll-feed

# Posts land in _posts/. Drafts sit in _drafts/ and are NOT built by
# GitHub Pages, so nothing goes live until a draft is promoted to _posts/.
